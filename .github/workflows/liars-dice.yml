name: Liars Dice

on:
  pull_request:
    branches: [main]
    paths:
      - 'players/*'

jobs:
  run-game:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.11'

      - name: Detect challenger
        id: challenger
        run: |
          git fetch origin main
          new_file=$(git diff --name-only origin/main HEAD -- players/ | head -1)
          player=$(basename "$new_file" .py)
          echo "name=$player" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: uv sync --no-install-project

      - name: Restore leaderboard from main
        run: |
          git checkout origin/main -- leaderboard.yaml \
            || printf 'total_runs: 0\nlast_updated: null\nplayers: {}\n' > leaderboard.yaml

      - name: Run game
        run: uv run python -m game ${{ vars.N_GAMES || '100' }} ${{ vars.TOP_N || '4' }} 2>&1 | tee game_output.txt

      - name: Evaluate result
        id: result
        env:
          CHALLENGER: ${{ steps.challenger.outputs.name }}
        run: python3 .github/scripts/evaluate_v1.py

      - name: Post comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr comment ${{ github.event.pull_request.number }} --body-file comment.md

      - name: Commit leaderboard
        if: steps.result.outputs.made_it == 'true'
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add leaderboard.yaml
          if ! git diff --cached --quiet; then
            git commit -m "ci: update leaderboard [skip ci]"
            git push
          fi

      - name: Enable auto-merge
        if: steps.result.outputs.made_it == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge ${{ github.event.pull_request.number }} --auto --squash

      - name: Fail if challenger did not qualify
        if: steps.result.outputs.made_it == 'false'
        run: exit 1
