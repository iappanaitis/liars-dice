name: Guard Non-Player PRs

on:
  pull_request:
    branches: [main]

jobs:
  check-files:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for file scope violations
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch origin main
          all_changed=$(git diff --name-only origin/main HEAD)
          player_files=$(echo "$all_changed" | grep '^players/' || true)
          non_player_files=$(echo "$all_changed" | grep -v '^players/' || true)

          # Rule 1: No mixed PRs — players/* and non-players/* cannot coexist in one PR
          if [ -n "$player_files" ] && [ -n "$non_player_files" ]; then
            gh pr comment ${{ github.event.pull_request.number }} \
              --body "❌ This PR mixes \`players/\` files with files outside \`players/\`. These must be submitted as separate PRs. Player files: $(echo "$player_files" | tr '\n' ' ') | Other files: $(echo "$non_player_files" | tr '\n' ' ')"
            exit 1
          fi

          # Rule 2: Only admins may submit non-players/* files
          if [ -n "$non_player_files" ]; then
            is_admin=$(gh api repos/${{ github.repository }}/collaborators/${{ github.actor }}/permission \
              --jq '.permission == "admin"' 2>/dev/null || echo "false")

            if [ "$is_admin" != "true" ]; then
              gh pr comment ${{ github.event.pull_request.number }} \
                --body "❌ This PR modifies files outside \`players/\`. Only admins may change other parts of the repository. Files: $(echo "$non_player_files" | tr '\n' ' ')"
              exit 1
            fi

            echo "Actor ${{ github.actor }} is admin with non-player files only — OK"
            exit 0
          fi

          echo "All changed files are in players/ — OK"
