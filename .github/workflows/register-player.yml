name: Register Player

on:
  pull_request:
    branches: [main]
    paths: ["players/**"]

env:
  PYTHONPATH: .

jobs:
  validate:
    # Executes contributor code (game.validate imports the player file), so it
    # holds no PAT and only a read-scoped GITHUB_TOKEN. It can comment on the PR.
    permissions:
      contents: read
      pull-requests: write
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --no-install-project

      - name: Validate player can be imported and instantiated
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          git fetch origin main

          # Skip non-player PRs (same guard as register job)
          all_changed=$(git diff --name-only origin/main...HEAD || true)
          non_player=$(echo "$all_changed" | grep -v '^players/' || true)
          if [ -n "$non_player" ]; then
            echo "PR touches non-player files — skipping validation."
            exit 0
          fi

          # Only validate added/modified files; deletions don't need an import check
          changed=$(git diff --name-only --diff-filter=AM origin/main...HEAD -- 'players/*.py' || true)
          if [ -z "$changed" ]; then
            echo "No player files added or modified — skipping validation."
            exit 0
          fi

          while IFS= read -r player_file; do
            [ -z "$player_file" ] && continue
            if ! output=$(uv run python -m game.validate "$player_file" 2>&1); then
              echo "$output"
              gh pr comment "$PR_NUMBER" --body "❌ Player file cannot be loaded — fix these errors before the PR can be merged:\`\`\`${output}\`\`\`"
              exit 1
            fi
            echo "$output"
          done <<< "$changed"

  register:
    # Holds LEADERBOARD_PAT and runs no contributor code. Privileged operations
    # use the PAT (GH_TOKEN); its own GITHUB_TOKEN only needs checkout read.
    permissions:
      contents: read
    needs: validate
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --no-install-project

      - name: Validate and queue merge
        env:
          GH_TOKEN: ${{ secrets.LEADERBOARD_PAT }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          ACTOR: ${{ github.actor }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          git fetch origin main

          # If the PR touches any files outside players/, it's not a player registration PR — skip.
          all_changed=$(git diff --name-only origin/main...HEAD || true)
          non_player=$(echo "$all_changed" | grep -v '^players/' || true)
          if [ -n "$non_player" ]; then
            echo "PR touches non-player files — not a player registration PR, skipping."
            exit 0
          fi

          added=$(git diff --name-only --diff-filter=A origin/main...HEAD -- 'players/*.py' || true)
          modified=$(git diff --name-only --diff-filter=M origin/main...HEAD -- 'players/*.py' || true)
          deleted=$(git diff --name-only --diff-filter=D origin/main...HEAD -- 'players/*.py' || true)

          n_added=0; [ -n "$added" ] && n_added=$(echo "$added" | wc -l | tr -d ' ')
          n_modified=0; [ -n "$modified" ] && n_modified=$(echo "$modified" | wc -l | tr -d ' ')
          n_deleted=0; [ -n "$deleted" ] && n_deleted=$(echo "$deleted" | wc -l | tr -d ' ')

          post_rejection() {
            gh pr comment "$PR_NUMBER" --body "❌ $1"
            exit 1
          }

          # Reject mixed PRs
          if [ "$n_deleted" -gt 0 ] && [ "$((n_added + n_modified))" -gt 0 ]; then
            post_rejection "PRs must not mix player additions/modifications with deletions."
          fi
          if [ "$n_added" -gt 1 ]; then
            post_rejection "Each PR must add exactly one player file."
          fi
          if [ "$n_modified" -gt 1 ]; then
            post_rejection "Each PR must modify exactly one player file."
          fi

          # ── Deletion ──
          if [ "$n_deleted" -gt 0 ] && [ "$n_added" -eq 0 ] && [ "$n_modified" -eq 0 ]; then
            is_admin=$(gh api "repos/${REPOSITORY}/collaborators/${ACTOR}/permission" \
              --jq '.permission == "admin"' 2>/dev/null || echo "false")

            if [ "$is_admin" != "true" ]; then
              while IFS= read -r filepath; do
                [ -z "$filepath" ] && continue
                cls_stem=$(basename "$filepath" .py)
                owner=$(uv run python .github/scripts/lb_owner.py "$cls_stem")
                if [ "$owner" != "$ACTOR" ]; then
                  post_rejection "You can only delete your own player files. '$filepath' belongs to '${owner}'."
                fi
              done <<< "$deleted"
            fi

            gh pr merge "$PR_NUMBER" --auto --squash
            exit 0
          fi

          # ── Addition ──
          # The validate job (needs: validate) already imported and vetted the
          # player file. This privileged step must NOT execute player code, so
          # it only checks uniqueness against leaderboard.yaml by class name.
          if [ "$n_added" -eq 1 ] && [ "$n_modified" -eq 0 ] && [ "$n_deleted" -eq 0 ]; then
            player_file="$added"
            cls_stem=$(basename "$player_file" .py)
            exists=$(uv run python .github/scripts/lb_has_player.py "$cls_stem")
            if [ "$exists" = "true" ]; then
              post_rejection "A player with that class name already exists. Please choose a unique class name."
            fi
            gh pr merge "$PR_NUMBER" --auto --squash
            exit 0
          fi

          # ── Modification ──
          if [ "$n_modified" -eq 1 ] && [ "$n_added" -eq 0 ] && [ "$n_deleted" -eq 0 ]; then
            player_file="$modified"
            cls_stem=$(basename "$player_file" .py)

            is_admin=$(gh api "repos/${REPOSITORY}/collaborators/${ACTOR}/permission" \
              --jq '.permission == "admin"' 2>/dev/null || echo "false")
            owner=$(uv run python .github/scripts/lb_owner.py "$cls_stem")

            if [ "$is_admin" != "true" ] && [ "$owner" != "$ACTOR" ]; then
              post_rejection "You can only modify your own player files. '$player_file' belongs to '${owner}'."
            fi

            gh pr merge "$PR_NUMBER" --auto --squash
            exit 0
          fi

          post_rejection "No valid player file changes detected. PRs touching \`players/\` must add, modify, or delete \`.py\` files."
