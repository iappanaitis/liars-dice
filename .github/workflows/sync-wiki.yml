name: Sync Wiki

on:
  push:
    branches: [main]
    paths:
      - "docs/wiki/**"

concurrency:
  group: sync-wiki
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone wiki repo
        run: |
          git clone "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git" /tmp/wiki

      - name: Copy docs/wiki/* into wiki repo
        run: cp docs/wiki/* /tmp/wiki/

      - name: Commit and push if changed
        run: |
          cd /tmp/wiki
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No wiki changes to push."
          else
            git commit -m "docs: sync wiki from docs/wiki/ [skip ci]"
            git push
          fi
